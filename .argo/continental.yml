kind: Workflow
metadata:
  name: coastlines-continental
  namespace: argo
spec:
  entrypoint: workflow-entrypoint
  serviceAccountName: public-bucket-writer
  podGC:
    strategy: OnWorkflowSuccess
    deleteDelayDuration: 600s
  podMetadata:
    labels:
      app: coastlines
    annotations:
      karpenter.sh/do-not-disrupt: "true"
  nodeSelector:
    karpenter.sh/capacity-type: "spot"
  hostAliases:
    - ip: "3.5.87.18"
      hostnames:
        - "dep-public-staging.s3.us-west-2.amazonaws.com"
  arguments:
    parameters:
    - name: image-tag
      value: "v0.8.4.dev3"
  templates:
  - name: workflow-entrypoint
    container:
      image: "ghcr.io/digitalearthpacific/dep-coastlines:{{ workflow.parameters.image-tag }}"
      imagePullPolicy: IfNotPresent
      resources:
        requests: 
          memory: 32Gi
          cpu: 4 
      command: [ python ]
      args:
        - src/continental.py
        - --vector_version
        - "0.8.4.dev3"
