kind: Workflow
metadata:
  generateName: ocm
  namespace: argo
spec:
  entrypoint: loop-map-ocm
  serviceAccountName: public-bucket-writer
  podGC:
    strategy: OnPodSuccess
    deleteDelayDuration: 600s
  parallelism: 50
  activeDeadlineSeconds: 360000
  tolerations:
  - key: digitalearthpacific.org/node-purpose
    operator: Equal
    value: argo
    effect: NoSchedule
  arguments:
    parameters:
    - name: image-tag
      value: "s2-validation-7"
  templates:
  - name: loop-map-ocm
    retryStrategy:
      limit: "2"
      retryPolicy: "OnFailure"
    dag:
      tasks:
        - name: generate-ids
          template: generate
        - name: process-id
          depends: generate-ids.Succeeded
          template: process-item
          arguments:
            parameters:
            - name: tile
              value: "{{item.tile}}"
            - name: year
              value: "{{item.year}}"
          withParam: "{{ tasks.generate-ids.outputs.result }}"
  - name: generate
    container:
      image: "ghcr.io/digitalearthpacific/dep-coastlines:{{ workflow.parameters.image-tag }}"
      imagePullPolicy: IfNotPresent
      resources:
        requests: 
          memory: 100Mi
          cpu: 1.0
      command: [ python ]
      args:
        - dep_coastlines/validation/s2_annual_composites.py
        - tiles-and-years
        - --output-json
        - "True"
  - name: process-item
    inputs:
      parameters:
      - name: tile
      - name: year
    container:
      image: "ghcr.io/digitalearthpacific/dep-coastlines:{{ workflow.parameters.image-tag }}"
      imagePullPolicy: IfNotPresent
      resources:
        requests: 
          memory: 64Gi
          cpu: 8.0
        limits:
          cpu: 12.0
          memory: 96Gi
      command: [ python ]
      args:
        - dep_coastlines/validation/s2_annual_composites.py
        - create-mosaic
        - "{{ inputs.parameters.tile }}"
        - "{{ inputs.parameters.year }}"
      env:
        - name: DASK_ARRAY__RECHUNK__METHOD
          value: "tasks"
